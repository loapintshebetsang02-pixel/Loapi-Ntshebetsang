<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
 
</head>
<style>
    body {
        background-color: lightgray;
        font-family: Arial, Helvetica, sans-serif;
        padding: 30px;
    }
 
    form {
        background-color: white;
        padding: 25px;
        border-radius: 8px;
        width: 400px;
        margin: 0 auto;
        margin-top: 50px;
        margin-bottom: 50px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
 
    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
 
    input, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    textarea {
        height : 120px;
        resize: none;
    }
 
    .button {
        margin-top: 20px;
        text-align:center;
    }
 
    button {
       
        font-size: 16px;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
 
    .submit-btn {
        background-color: #0c2131;
        color: white;
    }
    .clear-btn {
        background-color: #ccc;
        color: black;
        margin-right: 10px;
    }
 
    button:hover {
        opacity: 0.9;
    }
</style>
<body>
 
    <!--Header Section -->
    <header>
        <h1>WELCOME TO URBAN WEAR</h1>
       <p>Your one-stop online clothing store</p>
   </header>
 
   <!-- Navigation -->
    <nav>

    <!--Main Content -->
   <main>
 
        <section>
            <h1>Contact Us</h1>
            <p>If you have any questions, feedback, or need assistance, please don't hesitate to contact us.
               We are here to help and would love to hear from you!</p>
        </section>
 
        <form action="acknowledgement.html" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
 
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
 
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
 
            <div class="button">
                <button type="submit" class="submit-btn">Submit</button>
                <button type="reset" class="clear-btn">Clear</button>
            </div>
        </form>
